name: Self Improve Docs Proposal

on:
  workflow_dispatch:
    inputs:
      use_openai:
        description: "Use OPENAI_API_KEY secret for proposal generation"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  propose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Run eval
        if: inputs.use_openai == 'false'
        run: python -m maintainer_bot.cli eval-docs --dry-run --fail-under 0

      - name: Run eval with OpenAI
        if: inputs.use_openai == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: python -m maintainer_bot.cli eval-docs --fail-under 0

      - name: Write proposal
        if: inputs.use_openai == 'false'
        run: python -m maintainer_bot.cli propose-improvement --dry-run

      - name: Write proposal with OpenAI
        if: inputs.use_openai == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
        run: python -m maintainer_bot.cli propose-improvement

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: 자가 개선 제안 추가"
          title: "문서: 자가 개선 제안 추가"
          body: |
            이 PR은 자가 개선 workflow가 생성했습니다.

            기본적으로 제안/리포트 파일만 작성합니다. 문서, 프롬프트, eval, 코드에 적용하기 전에 제안 내용을 검토하세요.
          branch: bot/self-improve-docs
          add-paths: |
            proposals/**
