name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Run CLI smoke tests
        run: |
          python repo_health_bot.py .
          python repo_health_bot.py . --json
